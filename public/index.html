<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chopper Chat</title>

<style>
body{
  margin:0;
  display:flex;
  height:100vh;
  font-family:sans-serif;
  background:#0b1020;
  color:white;
}

.main{display:flex;flex:1}

/* avatar */
.side{
  width:40%;
  background:#000;
}

#chopIMG{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* chat */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.msgs{
  flex:1;
  padding:20px;
  overflow:auto;
}

.msg{margin-bottom:12px}

.user{text-align:right;color:#ffb6c1}
.bot{color:#8fd3ff}

.input{
  display:flex;
  border-top:1px solid #333;
}

textarea{flex:1;padding:10px}
button{width:60px}
</style>
</head>

<body>

<div class="main">

<div class="side">
  <img id="chopIMG" src="/images/feliz.png">
</div>

<div class="chat">

<div class="msgs" id="msgs"></div>

<div class="input">
<textarea id="inp"></textarea>
<button onclick="send()">➤</button>
</div>

</div>

</div>

<script>
const msgs = document.getElementById("msgs");

function addMsg(text, cls){
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerText = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

// avatar dinámico
function setMood(){
  const imgs = ["feliz","timido","enojado","emocionado"];
  const r = imgs[Math.floor(Math.random()*imgs.length)];
  document.getElementById("chopIMG").src = "/images/" + r + ".png";
}

// voz mejorada simple
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang="es-ES";
  u.rate=0.8;
  u.pitch=1.8;

  u.onend = ()=>{
    setTimeout(()=>{
      const audio = new Audio('/sounds/steps.mp3');
      audio.play();
    },400);
  };

  speechSynthesis.speak(u);
}

// personalidad básica
function reply(text){
  if(text.includes("kawaii")){
    return "¡C-CALLA!";
  }
  return "¡Soy Chopper!";
}

function send(){
  const input = document.getElementById("inp");
  const text = input.value.trim();
  if(!text) return;

  input.value="";
  addMsg(text,"user");

  const r = reply(text);

  setTimeout(()=>{
    addMsg(r,"bot");
    speak(r);
    setMood();
  },400);
}
</script>

</body>
</html>
