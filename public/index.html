<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chopper Chat ⚕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1a2b;--side:#0a1220;--chat:#0d1825;
  --border:#1e3050;--bubble-bg:#0f2035;--user-bg:#18091c;
  --text:#f0f0f0;--muted:#4a7a9a;--accent:#2090d8;
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,#1a3a5a22,transparent 55%),radial-gradient(ellipse at 80% 90%,#0a1a3022,transparent 55%);pointer-events:none}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:#08101aee;border-bottom:1px solid var(--border);flex-shrink:0;backdrop-filter:blur(8px);z-index:10}
.topbar-title{font-family:'Bangers',cursive;font-size:1.6rem;letter-spacing:4px;color:#2090d8;text-shadow:0 0 20px #2090d855}
.topbar-sub{font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.online{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.65rem;color:#40c8a8}
.online-dot{width:7px;height:7px;border-radius:50%;background:#40c8a8;box-shadow:0 0 7px #40c8a8;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* SIDE */
.side{width:220px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:20px 8px 14px;background:var(--side);border-right:1px solid var(--border);gap:10px}

.avatar-wrap{width:170px;height:200px;position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}
.avatar-wrap:active{transform:scale(.97)}

.bubble{position:absolute;top:-6px;right:-22px;background:#fff;color:#111;font-family:'Bangers',cursive;font-size:.7rem;letter-spacing:1px;padding:4px 10px;border-radius:12px;white-space:nowrap;box-shadow:0 2px 8px #0003;z-index:5;transition:all .3s}
.bubble::after{content:'';position:absolute;bottom:-6px;left:12px;border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid #fff}

#chopSVG{width:100%;height:100%;filter:drop-shadow(0 8px 20px #00000066);transition:transform .3s}

.chopper-name{font-family:'Bangers',cursive;font-size:1.2rem;letter-spacing:3px}
.chopper-role{font-size:.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;text-align:center}

.pills{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.pill{font-size:.55rem;padding:2px 8px;border-radius:7px;font-weight:900;letter-spacing:1px;text-transform:uppercase;transition:all .3s;border:1px solid var(--border);color:var(--muted);background:#0f2035}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--chat)}

.msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.msg{display:flex;flex-direction:column;max-width:84%;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.c{align-self:flex-start}
.msg.u{align-self:flex-end}
.mlabel{font-size:.58rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.msg.u .mlabel{text-align:right}
.mbubble{padding:10px 14px;border-radius:16px;font-size:.9rem;line-height:1.55}
.msg.c .mbubble{background:var(--bubble-bg);border:1px solid var(--border);border-bottom-left-radius:3px}
.msg.u .mbubble{background:var(--user-bg);border:1px solid #3a1830;border-bottom-right-radius:3px;color:#ffc8d8}
em.expr{color:#f7c948;font-style:italic}

.qr{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px;flex-shrink:0}
.qr button{background:#0f2035;border:1px solid var(--border);color:var(--muted);font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:700;padding:5px 11px;border-radius:16px;cursor:pointer;white-space:nowrap;transition:all .15s}
.qr button:hover{background:#1e3a55;color:#fff;border-color:var(--accent)}

.inp-area{display:flex;gap:9px;padding:12px 14px;border-top:1px solid var(--border);background:#08101aee;flex-shrink:0;backdrop-filter:blur(8px)}
textarea{flex:1;background:#0f2035;border:1px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;padding:10px 14px;border-radius:12px;outline:none;resize:none;min-height:42px;max-height:100px;transition:border-color .2s;line-height:1.4}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
.sbtn{background:var(--accent);border:none;color:#fff;width:42px;height:42px;border-radius:12px;font-size:1.1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px #2090d844;transition:all .15s}
.sbtn:hover{transform:scale(1.07);box-shadow:0 4px 18px #2090d877}
.sbtn:active{transform:scale(.95)}
.sbtn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* Typing dots */
.dots{display:flex;gap:4px;align-items:center;padding:10px 14px}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block}
.d1{animation:db 1.2s infinite}
.d2{animation:db 1.2s .2s infinite}
.d3{animation:db 1.2s .4s infinite}
@keyframes db{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}

/* Avatar animations */
@keyframes bounce{0%,100%{transform:translateY(0)}35%{transform:translateY(-18px)}65%{transform:translateY(-7px)}}
@keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-7deg)}40%{transform:rotate(7deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.anim-bounce{animation:bounce .7s ease}
.anim-shake{animation:shake .5s ease}
.anim-pulse{animation:pulse .6s ease}
.anim-idle{animation:idle 3s ease-in-out infinite}

@media(max-width:600px){
  .side{width:130px}
  .avatar-wrap{width:110px;height:130px}
  .chopper-role,.pills{display:none}
}
</style>
</head>

<script>
const $=id=>document.getElementById(id);
const sO=(id,v)=>{const e=$(id);if(e)e.setAttribute('opacity',v)};
const sA=(id,a,v)=>{const e=$(id);if(e)e.setAttribute(a,v)};

// ── SOUNDS ────────────────────────────────────────────────────────────────
let actx;
function gc(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function beep(f,d,t='sine',v=.12){
  try{const c=gc(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
  o.start();o.stop(c.currentTime+d)}catch(e){}
}
const sounds={
  happy:   ()=>{beep(660,.1);setTimeout(()=>beep(880,.12),90);setTimeout(()=>beep(1100,.15),180)},
  shy:     ()=>{beep(440,.1);setTimeout(()=>beep(380,.15),110)},
  angry:   ()=>{beep(180,.08,'sawtooth',.16);setTimeout(()=>beep(150,.12,'sawtooth',.13),80)},
  excited: ()=>[660,770,880,990,1100].forEach((f,i)=>setTimeout(()=>beep(f,.1),i*55)),
  sad:     ()=>{beep(330,.2);setTimeout(()=>beep(280,.25),190);setTimeout(()=>beep(240,.3),380)},
  poke:    ()=>{beep(520,.07);setTimeout(()=>beep(660,.09),80)},
  msg:     ()=>beep(650,.06,'sine',.07),
  thinking:()=>{},
};

// ── MOODS ──────────────────────────────────────────────────────────────────
const MOODS={
  happy:   {bubble:'¡FELIZ! uwu',  pill:'p-happy',  bg:'#f7c948',tc:'#1a0a00',anim:'bounce'},
  shy:     {bubble:'>//< ¡BAKA!', pill:'p-shy',    bg:'#f09090',tc:'#4a0010',anim:'pulse'},
  angry:   {bubble:'¡BAKAAAA!',   pill:'p-angry',  bg:'#e63950',tc:'#fff',   anim:'shake'},
  excited: {bubble:'¡WAAAA! ★',   pill:'p-excited',bg:'#40c8b8',tc:'#001a18',anim:'bounce'},
  sad:     {bubble:'...sniff...', pill:'p-sad',    bg:'#6688cc',tc:'#fff',   anim:'pulse'},
  thinking:{bubble:'...hmm...',   pill:null,       bg:null,     tc:null,     anim:null},
};

let curMood='happy';

function applyMood(name){
  curMood=name;
  const m=MOODS[name]||MOODS.happy;

  sO('eL','1');sO('eR','1');sO('iL','1');sO('iR','1');
  sO('hL','1');sO('hR','1');sO('pL','1');sO('pR','1');
  sO('bwL','0');sO('bwR','0');sO('sL','0');sO('sR','0');
  sO('tL','0');sO('tR','0');sO('tdL','0');sO('tdR','0');
  sO('mSm','0');sO('mFr','0');sO('mOp','0');sO('mOpI','0');

  if(name==='happy')    {sA('eL','ry','11');sA('eR','ry','11');sO('mSm','1');sO('bkL','.35');sO('bkR','.35')}
  else if(name==='shy') {sA('eL','ry','8');sA('eR','ry','8');sO('mSm','1');sO('bkL','.8');sO('bkR','.8')}
  else if(name==='angry'){sA('eL','ry','8');sA('eR','ry','8');sO('bwL','1');sO('bwR','1');sO('hL','0');sO('hR','0');sO('pL','0');sO('pR','0');sO('mFr','1');sO('bkL','0');sO('bkR','0')}
  else if(name==='excited'){sO('eL','0');sO('eR','0');sO('iL','0');sO('iR','0');sO('hL','0');sO('hR','0');sO('pL','0');sO('pR','0');sO('sL','1');sO('sR','1');sO('mOp','1');sO('mOpI','1');sO('bkL','.5');sO('bkR','.5')}
  else if(name==='sad') {sA('eL','ry','10');sA('eR','ry','10');sO('tL','1');sO('tR','1');sO('tdL','1');sO('tdR','1');sO('mFr','1');sO('bkL','0');sO('bkR','0')}
  else                  {sA('eL','ry','10');sA('eR','ry','10');sO('mSm','1');sO('bkL','.2');sO('bkR','.2')}

  $('bubble').textContent=m.bubble;

  document.querySelectorAll('.pill').forEach(p=>{p.style.background='';p.style.color='';p.style.borderColor='';p.style.boxShadow=''});
  if(m.pill){const p=$(m.pill);if(p){p.style.background=m.bg;p.style.color=m.tc;p.style.borderColor=m.bg;p.style.boxShadow=`0 2px 8px ${m.bg}55`}}

  const w=$('avatarWrap');
  w.className='avatar-wrap';
  if(m.anim){void w.offsetWidth;w.classList.add('anim-'+m.anim);setTimeout(()=>{w.className='avatar-wrap anim-idle'},850)}
  else w.classList.add('anim-idle');

  sounds[name]&&sounds[name]();
}

function poke(){
  sounds.poke();
  const w=$('avatarWrap');
  w.className='avatar-wrap';void w.offsetWidth;w.classList.add('anim-bounce');
  setTimeout(()=>{w.className='avatar-wrap anim-idle'},800);
  const phrases=['¡Oye! ¡No me toques!','¡Baka! ¡Para ya!','...¡Eso hace cosquillas!','¡S-solo porque lo dices!','¡No soy un juguete!'];
  $('bubble').textContent=phrases[Math.floor(Math.random()*phrases.length)];
  setTimeout(()=>$('bubble').textContent=(MOODS[curMood]||MOODS.happy).bubble,2200);
}

// ── CHAT ──────────────────────────────────────────────────────────────────
let history=[],loading=false;

function detectMood(t){
  if(/baka|enojado|furioso|no me molest|monstruo/i.test(t))return'angry';
  if(/sonroj|>\/\/<|vergüenza|no es que|halagado|me alegr/i.test(t))return'shy';
  if(/\*salta|\*grita|increíble|waa|emocionante|lo mejor/i.test(t))return'excited';
  if(/triste|llora|sniff|extraño|hiriluk.*muri|dolor/i.test(t))return'sad';
  return'happy';
}

function fmt(text){
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*(.*?)\*/g,'<em class="expr">*$1*</em>');
}

function addMsg(role,text){
  const c=$('msgs'),d=document.createElement('div');
  d.className='msg '+(role==='chopper'?'c':'u');
  d.innerHTML=`<div class="mlabel">${role==='chopper'?'Chopper':'Tú'}</div><div class="mbubble">${fmt(text)}</div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
  if(role==='chopper')sounds.msg();
}

let typingEl=null;
function setLoading(v){
  loading=v;$('sb').disabled=v;
  const c=$('msgs');
  if(v){typingEl=document.createElement('div');typingEl.className='msg c';typingEl.innerHTML='<div class="mlabel">Chopper</div><div class="mbubble"><div class="dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div></div>';c.appendChild(typingEl);c.scrollTop=c.scrollHeight}
  else if(typingEl){typingEl.remove();typingEl=null}
}

async function send(){
  const inp=$('inp'),text=inp.value.trim();
  if(!text||loading)return;
  inp.value='';inp.style.height='auto';
  $('qr').style.display='none';
  const newHist=[...history,{role:'user',content:text}];
  history=newHist;
  addMsg('user',text);
  setLoading(true);
  applyMood('thinking');
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:newHist})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data?.error||'Error del servidor');
    const reply=data.reply||'...';
    history=[...newHist,{role:'assistant',content:reply}];
    addMsg('chopper',reply);
    const m=detectMood(reply);
    applyMood(m);
  }catch(e){
    addMsg('chopper','*gruñe* ¡El Den Den Mushi falló! '+e.message);
    applyMood('angry');
  }
  setLoading(false);
}

function sq(t){$('inp').value=t;send()}

applyMood('happy');
</script>
