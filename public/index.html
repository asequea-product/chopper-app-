<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chopper Chat ⚕</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0f1a;
  --side:#080d18;
  --chat:#0b1020;
  --border:#1a2840;
  --text:#f0f0f0;
  --accent:#2090d8;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Nunito',sans-serif;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
}

/* TOP */
.topbar{
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  font-family:'Bangers';
  color:var(--accent);
}

/* LAYOUT */
.main{flex:1;display:flex}

.side{
  width:45%;
  background:var(--side);
  position:relative;
}

.avatar-wrap{
  height:100%;
  position:relative;
  cursor:pointer;
}

#chopIMG{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.3s;
}

/* bubble */
.bubble{
  position:absolute;
  top:15px;
  right:15px;
  background:#fff;
  color:#000;
  padding:6px 12px;
  border-radius:14px;
  font-family:'Bangers';
}

/* animaciones */
.anim-bounce{animation:bounce .6s}
.anim-shake{animation:shake .5s}
.anim-pulse{animation:pulse .6s}
.anim-idle{animation:idle 3s infinite}

@keyframes bounce{50%{transform:translateY(-15px)}}
@keyframes shake{25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes pulse{50%{transform:scale(1.08)}}
@keyframes idle{50%{transform:translateY(-5px)}}

/* hablando */
.voice-active #chopIMG{animation:talk .4s infinite}
@keyframes talk{50%{transform:translateY(-4px)}}

/* chat */
.chat{flex:1;display:flex;flex-direction:column}

.msgs{flex:1;overflow:auto;padding:16px}

.msg{margin-bottom:10px}
.c{color:#8fd3ff}
.u{text-align:right;color:#ffc8d8}

.inp{
  display:flex;
  padding:10px;
  border-top:1px solid var(--border);
  position:sticky;
  bottom:0;
  background:#05080f;
}

textarea{flex:1;font-size:16px}
button{width:60px}

/* mobile */
@media(max-width:768px){
  .main{flex-direction:column}
  .side{width:100%;height:260px}
  .chat{height:calc(100dvh - 260px)}
}
</style>
</head>

<body>

<div class="topbar">⚕ CHOPPER CHAT</div>

<div class="main">

<div class="side">
  <div class="avatar-wrap" id="avatarWrap" onclick="poke()">
    <div class="bubble" id="bubble">¡HEY!</div>
    <img id="chopIMG" src="/images/feliz.png">
  </div>
</div>

<div class="chat">
  <div class="msgs" id="msgs"></div>

  <div class="inp">
    <textarea id="inp"></textarea>
    <button onclick="send()">➤</button>
  </div>
</div>

</div>

<script>
const $=id=>document.getElementById(id);

// ── MEMORY ─────────────────────────
let memory = {
  kindness: 0,
  aggression: 0,
  interaction: 0
};

try{
  const saved = localStorage.getItem('chopper_memory');
  if(saved) memory = JSON.parse(saved);
}catch(e){}

// ── IMÁGENES ───────────────────────
const MOOD_VARIANTS={
  happy:['feliz','dancing','emocionado'],
  shy:['timido','pillin'],
  angry:['enojado','determinado'],
  sad:['triste'],
  thinking:['pensando','timido'],
  excited:['emocionado','dancing']
};

function applyMood(mood){
  const v=MOOD_VARIANTS[mood]||['feliz'];
  const img=v[Math.floor(Math.random()*v.length)];
  $('chopIMG').src=`/images/${img}.png`;

  const w=$('avatarWrap');
  w.className='avatar-wrap anim-idle';

  if(mood==='angry') w.classList.add('anim-shake');
  if(mood==='shy') w.classList.add('anim-pulse');
  if(mood==='happy') w.classList.add('anim-bounce');
}

// ── VOICE ─────────────────────────
function speak(text){
  const clean=text.replace(/\*[^*]+\*/g,'');

  const u=new SpeechSynthesisUtterance(clean);
  u.lang='es-ES';
  u.rate=0.85;
  u.pitch=1.9;

  document.body.classList.add('voice-active');

  u.onend=async ()=>{
    document.body.classList.remove('voice-active');
    await new Promise(r=>setTimeout(r,500));

    if(/calla|baka|idiota/i.test(clean)){
      new Audio('/sounds/steps.mp3').play();
    }
  };

  speechSynthesis.speak(u);
}

// ── MEMORY UPDATE ─────────────────
function updateMemory(text){
  if(/gracias|bonito|kawaii|te quiero|genial/i.test(text)){
    memory.kindness++;
  }
  if(/calla|idiota|rapido|tonto/i.test(text)){
    memory.aggression++;
  }
  memory.interaction++;
  localStorage.setItem('chopper_memory', JSON.stringify(memory));
}

// ── PERSONALIDAD ──────────────────
function personality(text){

  if(memory.aggression >= 3){
    return "¡BAKA! ¡No me hables así!";
  }

  if(memory.kindness >= 3 && /kawaii|bonito/i.test(text)){
    return "…oye… no digas eso tan directo.";
  }

  if(/kawaii|bonito/i.test(text)){
    return "¡C-CALLA! ¡No digas eso tan directo!";
  }

  if(/hola/i.test(text)){
    return "¡Oye!... hola.";
  }

  return null;
}

// ── MOOD ─────────────────────────
function detectMood(t){
  if(/calla|baka|idiota/i.test(t)) return 'angry';
  if(/n-no/i.test(t)) return 'shy';
  if(/emocion/i.test(t)) return 'excited';
  if(/triste/i.test(t)) return 'sad';
  return 'happy';
}

// ── CHAT ─────────────────────────
function add(role,text){
  const d=document.createElement('div');
  d.className='msg '+(role==='c'?'c':'u');
  d.innerText=text;
  $('msgs').appendChild(d);
  $('msgs').scrollTop=99999;

  if(role==='c'){
    speak(text);
    applyMood(detectMood(text));
    showBubble(text);
  }
}

function showBubble(t){
  $('bubble').innerText=t.slice(0,15);
}

// poke
function poke(){
  const phrases=["¡No me toques!","¡Baka!","¡Para!","...oye"];
  const p=phrases[Math.floor(Math.random()*phrases.length)];
  showBubble(p);
  speak(p);
}

// ── SEND ─────────────────────────
function send(){
  const t=$('inp').value.trim();
  if(!t) return;

  $('inp').value='';
  updateMemory(t);
  add('u',t);

  const forced=personality(t);

  if(forced){
    add('c',forced);
    return;
  }

  add('c',"¡Soy Chopper!");
}
</script>

</body>
</html>
